    // Lucide icon shim — wraps lucide UMD icons as React components
    const makeIcon = (name) => ({ size = 16, ...props } = {}) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide[name] || window.lucide['Circle']);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          ref.current.appendChild(svg);
        }
      }, [size]);
      return React.createElement('span', { ref, style: { display: 'inline-flex', alignItems: 'center' }, ...props });
    };
    const ChevronLeft  = makeIcon('ChevronLeft');

function useStickyState(def, key) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

const calcHours = (s, e) => {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let d = (eh + em / 60) - (sh + sm / 60);
  if (d < 0) d += 24;
  return parseFloat(d.toFixed(2));
};
const nowStr = () => { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const todayStr = () => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; };
const groupByMonth = (entries, lang) => {
  const groups = {};
  entries.forEach(e => {
    const dt = new Date(e.date + 'T00:00:00');
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    const label = dt.toLocaleDateString(lang === 'he' ? 'he-IL' : 'en-GB', { month: 'long', year: 'numeric' });
    if (!groups[key]) groups[key] = { label, entries: [] };
    groups[key].entries.push(e);
  });
  return Object.values(groups);
};

const doExportCSV = (sitter, t) => {
  const headers = ['Date','Type','Start','End','Hours','Rate','Earned','Bonus','Paid','Balance Effect','Note'];
  const rows = sitter.entries.map(e => [
    e.date, e.type || 'shift', e.start || '', e.end || '',
    e.hours, sitter.rate, e.earned.toFixed(2), e.bonus,
    e.paid.toFixed(2), (e.earned - e.paid).toFixed(2),
    '"' + (e.note || '').replace(/"/g, '""') + '"'
  ]);
  const totalEarned = sitter.entries.reduce((a,e) => a + e.earned, 0);
  const totalPaid   = sitter.entries.reduce((a,e) => a + e.paid,   0);
  rows.push([]);
  rows.push(['','','','','','TOTAL', totalEarned.toFixed(2),'', totalPaid.toFixed(2), sitter.balance.toFixed(2),'']);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${t.csvFilename}-${sitter.name}-${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(url);
};


const buildShareText = (sitter, t, lang) => {
  const months = groupByMonth(sitter.entries, lang);
  const lines = [];
  months.forEach(group => {
    const shifts   = group.entries.filter(e => e.hours > 0).length;
    const hours    = group.entries.reduce((a, e) => a + e.hours, 0);
    const paid     = group.entries.reduce((a, e) => a + e.paid,  0);
    lines.push(`📅 ${t.shareMonth} ${group.label}:`);
    lines.push(`   ${shifts} ${t.shareShifts} · ${hours.toFixed(1)} ${t.shareHours}`);
    lines.push(`   ${t.sharePaid}: ₪${paid.toFixed(0)}`);
  });
  const bal = sitter.balance;
  const balStr = bal === 0
    ? t.balanceSettled
    : bal > 0
      ? `${t.balanceOwe} ₪${bal.toFixed(2)}`
      : `${t.balanceCredit} ₪${Math.abs(bal).toFixed(2)}`;
  const text = [
    `👶 ${t.shareTitle} — ${sitter.name}`,
    `💰 ${t.shareBalance}: ${balStr}`,
    '',
    ...lines,
    '',
    t.shareThanks,
  ].join('\n');
  return text;
};

const doShare = async (sitter, t, lang, onToast) => {
  const text = buildShareText(sitter, t, lang);
  if (navigator.share) {
    try { await navigator.share({ title: t.shareTitle, text }); return; } catch {}
  }
  // Fallback: copy + WhatsApp link
  try { await navigator.clipboard.writeText(text); onToast(t.copied); } catch {}
  const encoded = encodeURIComponent(text);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');
};

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function BalanceDisplay({ balance, t, large }) {
  const cls = large ? 'stat-balance' : '';
  const sm = large ? {} : { fontSize: 13, fontWeight: 500 };
  if (balance === 0) return <span className={cls} style={{ ...sm, color: 'var(--text-muted)' }}>{t.balanceSettled}</span>;
  if (balance > 0) return <span className={cls} style={{ ...sm, color: 'var(--red)' }}>{t.balanceOwe} <strong>₪{balance.toFixed(2)}</strong></span>;
  return <span className={cls} style={{ ...sm, color: 'var(--green)' }}>{t.balanceCredit} <strong>₪{Math.abs(balance).toFixed(2)}</strong></span>;
}

/* ─────────────────────────────────────────────
   KebabMenu — reusable ⋯ dropdown (fixed positioning)
───────────────────────────────────────────── */
function KebabMenu({ items, small, isRtl }) {
  const [open, setOpen] = useState(false);
  const [coords, setCoords] = useState({ top: 0, left: 0 });
  const btnRef = useRef(null);
  const dropW = small ? 160 : 200;

  const openMenu = (e) => {
    e.stopPropagation();
    if (open) { setOpen(false); return; }
    const r = btnRef.current.getBoundingClientRect();
    // position below the button; flip left edge so it doesn't go off-screen
    let left = isRtl ? r.left : r.right - dropW;
    if (left < 8) left = 8;
    if (left + dropW > window.innerWidth - 8) left = window.innerWidth - dropW - 8;
    setCoords({ top: r.bottom + 6, left });
    setOpen(true);
  };

  useEffect(() => {
    if (!open) return;
    const close = (e) => {
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', close);
    document.addEventListener('touchstart', close);
    return () => { document.removeEventListener('mousedown', close); document.removeEventListener('touchstart', close); };
  }, [open]);

  // Close on scroll so dropdown doesn't float detached
  useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    window.addEventListener('scroll', close, true);
    return () => window.removeEventListener('scroll', close, true);
  }, [open]);

  const dropdown = open ? (
    <div className="dropdown" style={{ top: coords.top, left: coords.left, minWidth: dropW }}>
      {items.map((item, i) => (
        <button key={i} className={`dropdown-item${item.danger ? ' danger' : ''}`}
          onClick={(e) => { e.stopPropagation(); setOpen(false); item.onClick(); }}>
          <span style={{ display:'flex', alignItems:'center', fontSize: typeof item.icon === 'string' ? 15 : 14 }}>{item.icon}</span>
          {item.label}
        </button>
      ))}
    </div>
  ) : null;

  return (
    <div className="kebab-wrap">
      <button ref={btnRef} className={`kebab-btn${open ? ' open' : ''}`} onClick={openMenu}>⋯</button>
      {ReactDOM.createPortal(dropdown, document.body)}
    </div>
  );
}

/* ─────────────────────────────────────────────
   Entry Form  (Add & Edit)
───────────────────────────────────────────── */
function EntryForm({ t, sitter, initial, onSave, onClose }) {
  const isEdit = !!initial;
  const [tab,     setTab]     = useState(initial?.type || 'shift');
  const [date,    setDate]    = useState(initial?.date || todayStr());
  const [start,   setStart]   = useState(initial?.start  || '');
  const [end,     setEnd]     = useState(initial?.end    || '');
  const [paid,    setPaid]    = useState(initial?.type !== 'prepaid' && initial?.paid > 0 ? String(initial.paid) : '');
  const [bonus,   setBonus]   = useState(initial?.bonus  > 0 ? String(initial.bonus)  : '');
  const [prepaid, setPrepaid] = useState(initial?.type === 'prepaid' ? String(initial.paid) : '');
  const [note,    setNote]    = useState(initial?.note   || '');
  const [error,   setError]   = useState('');
  const [shaking, setShaking] = useState(false);

  const triggerError = (msg) => {
    setError(msg);
    setShaking(true);
    setTimeout(() => setShaking(false), 500);
  };

  const hours = calcHours(start, end);
  const crossesMidnight = !!(start && end && hours > 0 && end < start);

  const handleSave = () => {
    if (tab === 'shift'   && (!start || !end)) { triggerError(t.validationTimes);  return; }
    if (tab === 'payment' && !paid)            { triggerError(t.validationAmount); return; }
    if (tab === 'prepaid' && !prepaid)         { triggerError(t.validationAmount); return; }
    setError('');
    const h         = tab === 'shift' ? hours : 0;
    const earnedAmt = tab === 'shift' ? h * sitter.rate + (parseFloat(bonus) || 0) : 0;
    const paidAmt   = tab === 'prepaid' ? parseFloat(prepaid) : (parseFloat(paid) || 0);
    onSave({ id: initial?.id || Date.now().toString(), date,
      start: tab === 'shift' ? start : '', end: tab === 'shift' ? end : '',
      hours: h, earned: earnedAmt, paid: paidAmt, bonus: parseFloat(bonus) || 0, note,
      type: tab, crossesMidnight, timestamp: initial?.timestamp || Date.now() });
  };

  const moneyField = (label, color, val, setter) => (
    <div>
      <div className="section-label" style={{ color }}>{label}</div>
      <div style={{ position: 'relative' }}>
        <span style={{ position: 'absolute', insetInlineStart: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-dim)' }}>₪</span>
        <input className="input-glass" type="number" value={val} onChange={e => setter(e.target.value)} placeholder="0" min="0" style={{ paddingInlineStart: 26 }} />
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="drag-handle" />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 22, margin: 0 }}>{isEdit ? t.editEntry : t.addEntry}</h2>
          <button onClick={onClose} className="btn-icon"><X size={16}/></button>
        </div>
        {/* Tabs */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
          {[['shift', t.entryTypeShift], ['payment', t.entryTypePayment], ['prepaid', t.entryTypePrepaid]].map(([id, label]) => (
            <button key={id} className={`tab-btn ${tab === id ? 'active' : 'inactive'}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
          {/* Date */}
          <div>
            <div className="section-label">{t.formDate}</div>
            <input className="input-glass" type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>

          {/* Time range */}
          {tab === 'shift' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, background: 'rgba(255,255,255,0.04)', padding: 13, borderRadius: 14, border: '1px solid rgba(255,255,255,0.08)' }}>
              {[['start', start, setStart, t.formStart], ['end', end, setEnd, t.formEnd]].map(([, val, setter, label]) => (
                <div key={label}>
                  <div className="section-label">{label}</div>
                  <div style={{ display: 'flex', gap: 5 }}>
                    <input className="input-glass" type="time" value={val} onChange={e => setter(e.target.value)} style={{ flex: 1, padding: '9px 9px' }} />
                    <button className="btn-ghost" onClick={() => setter(nowStr())} style={{ padding: '8px 8px', fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }}>{t.btnNow}</button>
                  </div>
                </div>
              ))}
              {start && end && hours > 0 && (
                <div style={{ gridColumn: '1/-1', fontSize: 12, color: 'var(--accent)', fontWeight: 500 }}>
                  = {hours} {t.hours} · ₪{(hours * sitter.rate).toFixed(2)}
                  {crossesMidnight && <span style={{ color: 'var(--amber)', marginInlineStart: 8 }}>{t.crossesMidnight}</span>}
                </div>
              )}
            </div>
          )}

          {tab === 'shift' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {moneyField(t.formPaid,  '#6ee7b7', paid,  setPaid)}
              {moneyField(t.formBonus, '#f9a8d4', bonus, setBonus)}
            </div>
          )}
          {tab === 'payment' && moneyField(t.formPaid, '#6ee7b7', paid, setPaid)}
          {tab === 'prepaid' && (
            <div>
              {moneyField(t.formPrepaid, '#fcd34d', prepaid, setPrepaid)}
              <div style={{ fontSize: 11, color: 'var(--amber)', marginTop: 4 }}>{t.prepaidNote}</div>
            </div>
          )}

          {/* Note */}
          <div>
            <div className="section-label">{t.formNote}</div>
            <input className="input-glass" type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="..." />
          </div>

          {error && (
            <div className="error-msg">
              <span>⚠</span> {error}
            </div>
          )}

          <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
            <button className="btn-ghost"   onClick={onClose}    style={{ flex: 1, padding: '13px 0' }}>{t.btnCancel}</button>
            <button className="btn-primary" onClick={handleSave} style={{ flex: 2, padding: '13px 0', fontSize: 15 }}>{t.btnSave}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

          </button>
        ) : (
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 20, fontStyle: 'italic', background: 'linear-gradient(135deg,#a78bfa,#f472b6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
            {t.appTitle}
          </div>
        )}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {activeView === 'detail' && activeSitter && (
            <KebabMenu isRtl={isRtl} items={[
              { icon: '📤', label: t.menuShare,  onClick: () => doShare(activeSitter, t, lang, showToast) },
              { icon: <Download size={14}/>, label: t.menuExport, onClick: () => doExportCSV(activeSitter, t) },
              { icon: <Edit3 size={14}/>, label: t.menuEdit, onClick: () => setEditingSitter(activeSitter) },
              { icon: <Trash2 size={14}/>, label: t.menuDelete, onClick: () => handleDeleteSitter(activeSitterId), danger: true },
            ]} />
          )}
          <button onClick={() => setLang(l => l === 'en' ? 'he' : 'en')} className="btn-icon"><Languages size={15}/></button>
        </div>
      </header>

      <main style={{ maxWidth: 700, margin: '0 auto', padding: '20px 13px 110px', position: 'relative', zIndex: 1 }}>

        {/* ── LIST VIEW ── */}
        {activeView === 'list' && (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 22, paddingBottom: 13, borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 13, fontStyle: 'italic', color: 'var(--text-muted)' }}>{t.tagline}</div>
              <button className="btn-primary" onClick={() => setShowAddSitter(true)} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '9px 15px', fontSize: 13 }}>
                <Plus size={14}/> {t.addBabysitter}
              </button>
            </div>
            {sitters.length === 0 ? (
              <div className="fade-in" style={{ textAlign: 'center', padding: '70px 20px', border: '1px dashed rgba(255,255,255,0.12)', borderRadius: 28, background: 'rgba(255,255,255,0.02)' }}>
                <div style={{ fontSize: 42, marginBottom: 10 }}>👶</div>
                <div style={{ fontFamily: 'var(--font-serif)', fontSize: 19, marginBottom: 6 }}>{t.noBabysitters}</div>
                <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>{t.getStarted}</div>
              </div>
            ) : (
              <div className="stagger" style={{ display: 'grid', gap: 13, gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))' }}>
                {sitters.map(s => (
                  <SitterCard key={s.id} sitter={s} t={t} lang={lang} isRtl={isRtl}
                    onClick={() => { setActiveSitterId(s.id); setActiveView('detail'); }}
                    onShare={() => doShare(s, t, lang, showToast)}
                    onExport={() => doExportCSV(s, t)}
                    onEdit={() => setEditingSitter(s)}
                    onDelete={() => handleDeleteSitter(s.id)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── DETAIL VIEW ── */}
        {activeView === 'detail' && activeSitter && (
          <div className="fade-in">
            {/* Hero */}
            <div className="glass" style={{ borderRadius: 24, padding: 'clamp(13px,4vw,20px)', marginBottom: 16, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 1, background: 'linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)', pointerEvents: 'none' }} />
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(21px,6vw,32px)', marginBottom: 2, lineHeight: 1.1 }}>{activeSitter.name}</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 14 }}>₪{activeSitter.rate}{t.perHour}</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 7 }}>
                {[
                  { label: t.currentBalance,    value: <BalanceDisplay balance={activeSitter.balance} t={t} large /> },
                  { label: t.summaryTotalWorked, value: <span className="stat-value" style={{ color: 'var(--accent)' }}>{totalHours.toFixed(1)}</span> },
                  { label: t.summaryTotalPaid,   value: <span className="stat-value" style={{ color: 'var(--green)' }}>₪{totalPaid.toFixed(0)}</span> },
                ].map((s, i) => (
                  <div key={i} className="stat-card" style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)' }}>
                    <div className="section-label">{s.label}</div>
                    <div>{s.value}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Ledger */}
            <div style={{ marginBottom: 4, paddingInlineStart: 3, fontFamily: 'var(--font-serif)', fontSize: 16, fontStyle: 'italic', color: 'var(--text-muted)' }}>{t.shiftHistory}</div>
            {activeSitter.entries.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '38px 20px', color: 'var(--text-muted)', fontSize: 13 }}>{t.noEntries}</div>
            ) : (
              <div>
                {months.map(group => (
                  <div key={group.label}>
                    <div className="month-divider">{group.label}</div>
                    <div className="stagger" style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 4 }}>
                      {group.entries.map(entry => (
                        <EntryRow key={entry.id} entry={entry} t={t} lang={lang} isRtl={isRtl}
                          onDelete={handleDeleteEntry} onEdit={e => setEditingEntry(e)} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* FAB */}
            <button className="btn-primary" onClick={() => setShowAddEntry(true)} style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', display: 'flex', alignItems: 'center', gap: 7, padding: '14px 24px', fontSize: 15, zIndex: 40, whiteSpace: 'nowrap' }}>
              <Plus size={17}/> {t.addEntry}
            </button>
          </div>
        )}
      </main>

      {/* ── Modals ── */}
      {showAddSitter && <AddSitterModal t={t} onSave={handleAddSitter} onClose={() => setShowAddSitter(false)} />}
      {toast && <div className="toast">{toast}</div>}
      {editingSitter && <EditSitterModal t={t} sitter={editingSitter} onSave={handleEditSitter} onClose={() => setEditingSitter(null)} />}
      {(showAddEntry || editingEntry) && activeSitter && (
        <EntryForm t={t} sitter={activeSitter} initial={editingEntry || null}
          onSave={handleSaveEntry} onClose={() => { setShowAddEntry(false); setEditingEntry(null); }} />
      )}
    </div>
  );
}

    // Mount
    const root = ReactDOM_pkg.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>

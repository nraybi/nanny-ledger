      const ref = useRef(null);

        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const icons = window.lucide.icons || window.lucide;
          const svg = window.lucide.createElement(icons[name] || icons['Circle']);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          ref.current.appendChild(svg);
        }
      }, [size]);
      return React.createElement('span', { ref, style: { display: 'inline-flex', alignItems: 'center' }, ...props });
    };

function useStickyState(def, key) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

const calcHours = (s, e) => {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let d = (eh + em / 60) - (sh + sm / 60);
  if (d < 0) d += 24;
  return parseFloat(d.toFixed(2));
};
const nowStr = () => { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const todayStr = () => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; };
const groupByMonth = (entries, lang) => {
  const groups = {};
  entries.forEach(e => {
    const dt = new Date(e.date + 'T00:00:00');
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    const label = dt.toLocaleDateString(lang === 'he' ? 'he-IL' : 'en-GB', { month: 'long', year: 'numeric' });
    if (!groups[key]) groups[key] = { label, entries: [] };
    groups[key].entries.push(e);
  });
  return Object.values(groups);
};

const formatWA = (phone) => {
  if (!phone) return '';
  let cleaned = phone.replace(/\D/g, '');
  if (cleaned.startsWith('0') && cleaned.length === 10) cleaned = '972' + cleaned.substring(1);
  return cleaned;
};

const doExportCSV = (sitter, t, cur) => {
  const headers = ['Date','Type','Start','End','Hours','Rate','Earned','Bonus','Paid','Balance Effect','Note'];
  const rows = sitter.entries.map(e => [
    e.date, e.type || 'shift', e.start || '', e.end || '',
    e.hours, sitter.rate, e.earned.toFixed(2), e.bonus,
    e.paid.toFixed(2), (e.earned - e.paid).toFixed(2),
    '"' + (e.note || '').replace(/"/g, '""') + '"'
  ]);
  const totalEarned = sitter.entries.reduce((a,e) => a + e.earned, 0);
  const totalPaid   = sitter.entries.reduce((a,e) => a + e.paid,   0);
  rows.push([]);
  rows.push(['','','','','','TOTAL', totalEarned.toFixed(2),'', totalPaid.toFixed(2), sitter.balance.toFixed(2),'']);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${t.csvFilename}-${sitter.name}-${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(url);
};

const buildShareText = (sitter, t, lang, cur) => {
  const months = groupByMonth(sitter.entries, lang);
  const lines = [];
  months.forEach(group => {
    const shifts   = group.entries.filter(e => e.hours > 0).length;
    const hours    = group.entries.reduce((a, e) => a + e.hours, 0);
    const paid     = group.entries.reduce((a, e) => a + e.paid,  0);
    lines.push(`📅 ${t.shareMonth} ${group.label}:`);
    lines.push(`   ${shifts} ${t.shareShifts} · ${hours.toFixed(1)} ${t.shareHours}`);
    lines.push(`   ${t.sharePaid}: ${cur}${paid.toFixed(0)}`);
  });
  const bal = sitter.balance;
  const balStr = bal === 0
    ? t.balanceSettled
    : bal > 0
      ? `${t.balanceOwe} ${cur}${bal.toFixed(2)}`
      : `${t.balanceCredit} ${cur}${Math.abs(bal).toFixed(2)}`;
  const text = [`👶 ${t.shareTitle} — ${sitter.name}`, `💰 ${t.shareBalance}: ${balStr}`, '', ...lines, '', t.shareThanks].join('\n');
  return text;
};

const doShare = async (sitter, t, lang, cur, onToast) => {
  const text = buildShareText(sitter, t, lang, cur);
  if (navigator.share) { try { await navigator.share({ title: t.shareTitle, text }); return; } catch {} }
  try { await navigator.clipboard.writeText(text); onToast(t.copied); } catch {}
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
};

  [dir=rtl] .btn-back:hover{transform:translateX(2px);}
  
  .kebab-wrap{position:relative;z-index:10;}
  .kebab-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:var(--text);border-radius:10px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:18px;font-weight:700;}
  .kebab-btn:hover{background:rgba(255,255,255,0.14);}
  .kebab-btn.open{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.3);}
  @keyframes dropIn{from{opacity:0;transform:scale(0.92) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .dropdown{position:fixed;min-width:190px;background:rgba(14,10,28,0.97);border:1px solid rgba(255,255,255,0.14);border-radius:16px;overflow:hidden;z-index:9999;box-shadow:0 8px 40px rgba(0,0,0,0.7);backdrop-filter:blur(28px);animation:dropIn 0.18s cubic-bezier(0.34,1.4,0.64,1);}

`;

/* ─────────────────────────────────────────────
   Balance Display
───────────────────────────────────────────── */
function BalanceDisplay({ balance, cur, t, large }) {
  const cls = large ? 'stat-balance' : '';
  const sm = large ? {} : { fontSize: 13, fontWeight: 500 };
  if (balance === 0) return <span className={cls} style={{ ...sm, color: 'var(--text-muted)' }}>{t.balanceSettled}</span>;
  if (balance > 0) return <span className={cls} style={{ ...sm, color: 'var(--red)' }}>{t.balanceOwe} <strong>{cur}{balance.toFixed(2)}</strong></span>;
  return <span className={cls} style={{ ...sm, color: 'var(--green)' }}>{t.balanceCredit} <strong>{cur}{Math.abs(balance).toFixed(2)}</strong></span>;
}

/* ─────────────────────────────────────────────
   KebabMenu (Dropdown)
───────────────────────────────────────────── */
function KebabMenu({ items, small, isRtl }) {
  const [open, setOpen] = useState(false);
  const [coords, setCoords] = useState({ top: 0, left: 0 });
  const btnRef = useRef(null);
  const menuRef = useRef(null);
  const dropW = small ? 160 : 200;

  const openMenu = (e) => {
    e.stopPropagation();
    if (open) { setOpen(false); return; }
    const r = btnRef.current.getBoundingClientRect();
    let left = isRtl ? r.left : r.right - dropW;
    if (left < 8) left = 8;
    if (left + dropW > window.innerWidth - 8) left = window.innerWidth - dropW - 8;
    setCoords({ top: r.bottom + 6, left });
    setOpen(true);
  };

  useEffect(() => {
    if (!open) return;
    const close = (e) => {
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', close);
    document.addEventListener('touchstart', close);
    return () => { document.removeEventListener('mousedown', close); document.removeEventListener('touchstart', close); };
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    window.addEventListener('scroll', close, true);
    return () => window.removeEventListener('scroll', close, true);
  }, [open]);

  const dropdown = open ? (
    <div className="dropdown" ref={menuRef} style={{ top: coords.top, left: coords.left, minWidth: dropW }}>
      {items.map((item, i) => (
        <button key={i} className={`dropdown-item${item.danger ? ' danger' : ''}`}
          onClick={(e) => { e.stopPropagation(); setOpen(false); item.onClick(); }}>
          <span style={{ display:'flex', alignItems:'center', fontSize: typeof item.icon === 'string' ? 15 : 14 }}>{item.icon}</span>
          {item.label}
        </button>
      ))}
    </div>
  ) : null;

  return (
    <div className="kebab-wrap">
      <button ref={btnRef} className={`kebab-btn${open ? ' open' : ''}`} onClick={openMenu}>⋯</button>
      {ReactDOM.createPortal(dropdown, document.body)}
    </div>
  );
}

            {entry.note && <span style={{ fontSize: 11, color: 'var(--text-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 100 }}>{entry.note}</span>}
          </div>

        </div>
        <div style={{ textAlign: 'end', flexShrink: 0, marginInlineEnd: 4 }}>
          {entry.earned > 0 && <div style={{ color: 'var(--red)',   fontFamily: 'var(--font-serif)', fontSize: 14 }}>+{cur}{entry.earned.toFixed(2)}</div>}
          {entry.paid   > 0 && <div style={{ color: 'var(--green)', fontFamily: 'var(--font-serif)', fontSize: 14 }}>−{cur}{entry.paid.toFixed(2)}</div>}

/* ─────────────────────────────────────────────
   Entry Form (Add & Edit)
───────────────────────────────────────────── */
function EntryForm({ t, cur, sitter, initial, onSave, onClose }) {
  const isEdit = !!initial && !initial.isSettle;
  const isSettle = !!initial?.isSettle;
  const [tab,     setTab]     = useState(initial?.type || 'shift');
  const [date,    setDate]    = useState(initial?.date || todayStr());
  const [start,   setStart]   = useState(initial?.start  || '');
  const [end,     setEnd]     = useState(initial?.end    || '');
  const [paid,    setPaid]    = useState(initial?.type !== 'prepaid' && initial?.paid > 0 ? String(initial.paid) : '');
  const [bonus,   setBonus]   = useState(initial?.bonus  > 0 ? String(initial.bonus)  : '');
  const [prepaid, setPrepaid] = useState(initial?.type === 'prepaid' ? String(initial.paid) : '');
  const [note,    setNote]    = useState(initial?.note   || '');
  const [error,   setError]   = useState('');

  const triggerError = (msg) => { setError(msg); setTimeout(() => setError(''), 2500); };
  const hours = calcHours(start, end);
  const crossesMidnight = !!(start && end && hours > 0 && end < start);

  const handleSave = () => {
    if (tab === 'shift'   && (!start || !end)) { triggerError(t.validationTimes);  return; }
    if (tab === 'payment' && !paid)            { triggerError(t.validationAmount); return; }
    if (tab === 'prepaid' && !prepaid)         { triggerError(t.validationAmount); return; }
    setError('');
    const h         = tab === 'shift' ? hours : 0;
    const earnedAmt = tab === 'shift' ? h * sitter.rate + (parseFloat(bonus) || 0) : 0;
    const paidAmt   = tab === 'prepaid' ? parseFloat(prepaid) : (parseFloat(paid) || 0);
    onSave({ id: isEdit ? initial.id : Date.now().toString(), date,
      start: tab === 'shift' ? start : '', end: tab === 'shift' ? end : '',
      hours: h, earned: earnedAmt, paid: paidAmt, bonus: parseFloat(bonus) || 0, note,
      type: tab, crossesMidnight, timestamp: initial?.timestamp || Date.now() });
  };

  const moneyField = (label, color, val, setter) => (
    <div>
      <div className="section-label" style={{ color }}>{label} ({cur})</div>
      <div style={{ position: 'relative' }}>
        <span style={{ position: 'absolute', insetInlineStart: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-dim)' }}>{cur}</span>
        <input className="input-glass" type="number" value={val} onChange={e => setter(e.target.value)} placeholder="0" min="0" step="any" style={{ paddingInlineStart: 26 }} />
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="drag-handle" />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 22, margin: 0 }}>
            {isSettle ? t.settleBalance : (isEdit ? t.editEntry : t.addEntry)}
          </h2>
          <button onClick={onClose} className="btn-icon"><X size={16}/></button>
        </div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
          {[['shift', t.entryTypeShift], ['payment', t.entryTypePayment], ['prepaid', t.entryTypePrepaid]].map(([id, label]) => (
            <button key={id} className={`tab-btn ${tab === id ? 'active' : 'inactive'}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
          <div>
            <div className="section-label">{t.formDate}</div>
            <input className="input-glass" type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>

          {tab === 'shift' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, background: 'rgba(255,255,255,0.04)', padding: 13, borderRadius: 14, border: '1px solid rgba(255,255,255,0.08)' }}>
              {[['start', start, setStart, t.formStart], ['end', end, setEnd, t.formEnd]].map(([, val, setter, label]) => (
                <div key={label}>
                  <div className="section-label">{label}</div>
                  <div style={{ display: 'flex', gap: 5 }}>
                    <input className="input-glass" type="time" value={val} onChange={e => setter(e.target.value)} style={{ flex: 1, padding: '9px 9px' }} />
                    <button className="btn-ghost" onClick={() => setter(nowStr())} style={{ padding: '8px 8px', fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }}>{t.btnNow}</button>
                  </div>
                </div>
              ))}
              {start && end && hours > 0 && (
                <div style={{ gridColumn: '1/-1', fontSize: 12, color: 'var(--accent)', fontWeight: 500 }}>
                  = {hours} {t.hours} · {cur}{(hours * sitter.rate).toFixed(2)}
                  {crossesMidnight && <span style={{ color: 'var(--amber)', marginInlineStart: 8 }}>{t.crossesMidnight}</span>}
                </div>
              )}
            </div>
          )}

          {tab === 'shift' && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {moneyField(t.formPaid,  '#6ee7b7', paid,  setPaid)}
              {moneyField(t.formBonus, '#f9a8d4', bonus, setBonus)}
            </div>
          )}
          {tab === 'payment' && moneyField(t.formPaid, '#6ee7b7', paid, setPaid)}
          {tab === 'prepaid' && (
            <div>
              {moneyField(t.formPrepaid, '#fcd34d', prepaid, setPrepaid)}
              <div style={{ fontSize: 11, color: 'var(--amber)', marginTop: 4 }}>{t.prepaidNote}</div>
            </div>
          )}

          <div>
            <div className="section-label">{t.formNote}</div>
            <input className="input-glass" type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="..." />
          </div>

          {error && <div className="error-msg"><span>⚠</span> {error}</div>}

          <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
            <button className="btn-ghost"   onClick={onClose}    style={{ flex: 1, padding: '13px 0' }}>{t.btnCancel}</button>
            <button className="btn-primary" onClick={handleSave} style={{ flex: 2, padding: '13px 0', fontSize: 15 }}>
              {isSettle ? t.settleBalance : t.btnSave}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

            <input type="file" accept=".bak,.txt" style={{ display: 'none' }} onChange={handleFile} />
            <UploadCloud size={14}/> {t.restoreData}
          </label>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   Main App
───────────────────────────────────────────── */
function App() {
  const [lang, setLang]             = useStickyState('he', 'nl_lang');
  const [cur, setCur]               = useStickyState('₪', 'nl_currency');
  const [sitters, setSitters]       = useStickyState([], 'nl_sitters');
  const [activeView, setActiveView] = useState('list');
  const [activeSitterId, setActiveSitterId] = useState(null);
  
  // Modals & PWA State
  const [showAddSitter, setShowAddSitter]   = useState(false);
  const [editingSitter, setEditingSitter]   = useState(null);
  const [showAddEntry,  setShowAddEntry]    = useState(false);
  const [editingEntry,  setEditingEntry]    = useState(null);
  const [showSettings,  setShowSettings]    = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  
  const [toast, setToast] = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const t      = T[lang];
  const isRtl  = lang === 'he';

  // Listen for the PWA install event
  useEffect(() => {
    const handler = (e) => {
      e.preventDefault(); // Prevent Chrome from showing the mini-infobar automatically
      setDeferredPrompt(e); // Save it so we can trigger it from our Settings menu
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const handleInstallClick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') setDeferredPrompt(null);
  };

  useEffect(() => {
    document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    let el = document.getElementById('nl-styles');
    if (!el) { el = document.createElement('style'); el.id = 'nl-styles'; document.head.appendChild(el); }
    el.textContent = css;
  }, [isRtl]);

  const activeSitter = useMemo(() => sitters.find(s => s.id === activeSitterId), [sitters, activeSitterId]);
  const recalc    = es => es.reduce((a, e) => a + (e.earned - e.paid), 0);
  const sortedArr = es => [...es].sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp);

  const handleAddSitter = (data) => {
    setSitters(prev => [...prev, { id: Date.now().toString(), entries: [], balance: 0, ...data }]);
    setShowAddSitter(false);
  };

  const handleEditSitter = (data) => {
    setSitters(prev => prev.map(s => s.id === editingSitter.id ? { ...s, ...data } : s));
    setEditingSitter(null);
  };

  const handleDeleteSitter = (id) => { setSitters(prev => prev.filter(s => s.id !== id)); setActiveView('list'); };

  const handleSaveEntry = (entry) => {
    setSitters(prev => prev.map(s => {
      if (s.id !== activeSitterId) return s;
      const exists = s.entries.some(e => e.id === entry.id);
      const entries = sortedArr(exists ? s.entries.map(e => e.id === entry.id ? entry : e) : [entry, ...s.entries]);
      return { ...s, entries, balance: recalc(entries) };
    }));
    setShowAddEntry(false);
    setEditingEntry(null);
  };

  const handleDeleteEntry = (id) => {
    setSitters(prev => prev.map(s => {
      if (s.id !== activeSitterId) return s;
      const entries = s.entries.filter(e => e.id !== id);
      return { ...s, entries, balance: recalc(entries) };
    }));
  };

  // Backup & Restore
  const handleBackup = () => {
    try {
      const b64 = btoa(encodeURIComponent(JSON.stringify({ sitters })));
      const blob = new Blob([b64], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `nanny-ledger-${todayStr()}.bak`;
      a.click();
      showToast(t.backupSuccess);
    } catch (err) { showToast("Backup failed."); }
  };

  const handleRestore = (text) => {
    try {
      const json = JSON.parse(decodeURIComponent(atob(text)));
      if (json && json.sitters) {
        setSitters(json.sitters);
        showToast(t.restoreSuccess);
        setShowSettings(false);
      } else throw new Error();
    } catch (err) {
      showToast(t.restoreError);
    }
  };

  const months     = useMemo(() => activeSitter ? groupByMonth(activeSitter.entries, lang) : [], [activeSitter, lang]);
  const totalPaid  = activeSitter?.entries.reduce((a, e) => a + e.paid,  0) ?? 0;
  const totalHours = activeSitter?.entries.reduce((a, e) => a + e.hours, 0) ?? 0;

  return (
    <div style={{ minHeight: '100vh', fontFamily: 'var(--font-sans)', position: 'relative' }}>
      <div className="orbs"><div className="orb orb1"/><div className="orb orb2"/><div className="orb orb3"/></div>

      {/* ── Header ── */}
      <header style={{ position: 'sticky', top: 0, zIndex: 10, background: 'rgba(15,12,26,0.65)', backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)', borderBottom: '1px solid rgba(255,255,255,0.08)', padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
        {activeView === 'detail' ? (
          <button onClick={() => setActiveView('list')} className="btn-back">
            {isRtl ? <ArrowRight size={15}/> : <ArrowLeft size={15}/>} {t.back}
          </button>
        ) : (
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 20, fontStyle: 'italic', background: 'linear-gradient(135deg,#a78bfa,#f472b6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
            {t.appTitle}
          </div>
        )}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {/* Notification dot on settings if install is available */}
          <button onClick={() => setShowSettings(true)} className="btn-icon" style={{ position: 'relative' }}>
            <SettingsIcon size={16}/>
            {deferredPrompt && <div style={{ position: 'absolute', top: 6, right: 6, width: 8, height: 8, background: 'var(--red)', borderRadius: '50%' }} />}
          </button>
        </div>
      </header>

      <main style={{ maxWidth: 700, margin: '0 auto', padding: '20px 13px 110px', position: 'relative', zIndex: 1 }}>

        {/* ── LIST VIEW ── */}
        {activeView === 'list' && (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 22, paddingBottom: 13, borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 13, fontStyle: 'italic', color: 'var(--text-muted)' }}>{t.tagline}</div>
              <button className="btn-primary" onClick={() => setShowAddSitter(true)} style={{ gap: 6, padding: '9px 15px', fontSize: 13 }}>
                <Plus size={14}/> {t.addBabysitter}
              </button>
            </div>
            {sitters.length === 0 ? (
              <div className="fade-in" style={{ textAlign: 'center', padding: '70px 20px', border: '1px dashed rgba(255,255,255,0.12)', borderRadius: 28, background: 'rgba(255,255,255,0.02)' }}>
                <div style={{ fontSize: 42, marginBottom: 10 }}>👶</div>
                <div style={{ fontFamily: 'var(--font-serif)', fontSize: 19, marginBottom: 6 }}>{t.noBabysitters}</div>
                <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>{t.getStarted}</div>
              </div>
            ) : (
              <div className="stagger" style={{ display: 'grid', gap: 13, gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))' }}>
                {sitters.map(s => (
                  <SitterCard key={s.id} sitter={s} t={t} cur={cur} lang={lang} isRtl={isRtl}
                    onClick={() => { setActiveSitterId(s.id); setActiveView('detail'); }}
                    onShare={() => doShare(s, t, lang, cur, showToast)}
                    onExport={() => doExportCSV(s, t, cur)}
                    onEdit={() => setEditingSitter(s)}
                    onDelete={() => handleDeleteSitter(s.id)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── DETAIL VIEW ── */}
        {activeView === 'detail' && activeSitter && (
          <div className="fade-in">
            {/* Hero */}
            <div className="glass" style={{ borderRadius: 24, padding: 'clamp(13px,4vw,20px)', marginBottom: 16, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 1, background: 'linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)', pointerEvents: 'none' }} />
              
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(21px,6vw,32px)', marginBottom: 2, lineHeight: 1.1 }}>{activeSitter.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 14 }}>{cur}{activeSitter.rate}{t.perHour}</div>
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  {activeSitter.phone && (
                    <>
                      <a href={`tel:${activeSitter.phone}`} className="btn-action btn-phone"><Phone size={16} /></a>
                      <a href={`https://wa.me/${formatWA(activeSitter.phone)}`} target="_blank" className="btn-action btn-wa"><MessageCircle size={17} /></a>
                    </>
                  )}
                  <KebabMenu isRtl={isRtl} items={[
                    { icon: '📤', label: t.menuShare,  onClick: () => doShare(activeSitter, t, lang, cur, showToast) },
                    { icon: <Download size={14}/>, label: t.menuExport, onClick: () => doExportCSV(activeSitter, t, cur) },
                    { icon: <Edit3 size={14}/>, label: t.menuEdit, onClick: () => setEditingSitter(activeSitter) },
                    { icon: <Trash2 size={14}/>, label: t.menuDelete, onClick: () => handleDeleteSitter(activeSitterId), danger: true },
                  ]} />
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 7, marginBottom: activeSitter.balance !== 0 ? 12 : 0 }}>
                {[
                  { label: t.currentBalance,    value: <BalanceDisplay balance={activeSitter.balance} cur={cur} t={t} large /> },
                  { label: t.summaryTotalWorked, value: <span className="stat-value" style={{ color: 'var(--accent)' }}>{totalHours.toFixed(1)}</span> },
                  { label: t.summaryTotalPaid,   value: <span className="stat-value" style={{ color: 'var(--green)' }}>{cur}{totalPaid.toFixed(0)}</span> },
                ].map((s, i) => (
                  <div key={i} className="stat-card" style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)' }}>
                    <div className="section-label">{s.label}</div>
                    <div>{s.value}</div>
                  </div>
                ))}
              </div>

              {/* Settle Balance Button */}
              {activeSitter.balance > 0 && (
                <button className="btn-primary fade-in" onClick={() => setEditingEntry({ type: 'payment', paid: activeSitter.balance, isSettle: true })} style={{ width: '100%', padding: '12px', fontSize: 15, gap: 8, background: 'linear-gradient(135deg, #10b981, #059669)', boxShadow: '0 4px 15px rgba(16, 185, 129, 0.3)' }}>
                   <CheckCircle size={18} /> {t.settleBalance} ({cur}{activeSitter.balance.toFixed(2)})
                </button>
              )}
              {activeSitter.balance < 0 && (
                <button className="btn-primary fade-in" onClick={() => setEditingEntry({ type: 'shift', isSettle: true })} style={{ width: '100%', padding: '12px', fontSize: 15, gap: 8, background: 'linear-gradient(135deg, #f59e0b, #d97706)', boxShadow: '0 4px 15px rgba(245, 158, 11, 0.3)' }}>
                   <Clock size={18} /> {t.settlePrepaid}
                </button>
              )}
            </div>

            {/* Ledger */}
            <div style={{ marginBottom: 4, paddingInlineStart: 3, fontFamily: 'var(--font-serif)', fontSize: 16, fontStyle: 'italic', color: 'var(--text-muted)' }}>{t.shiftHistory}</div>
            {activeSitter.entries.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '38px 20px', color: 'var(--text-muted)', fontSize: 13 }}>{t.noEntries}</div>
            ) : (
              <div>
                {months.map(group => (
                  <div key={group.label}>
                    <div className="month-divider">{group.label}</div>
                    <div className="stagger" style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 4 }}>
                      {group.entries.map(entry => (
                        <EntryRow key={entry.id} entry={entry} t={t} cur={cur} lang={lang} isRtl={isRtl} onDelete={handleDeleteEntry} onEdit={e => setEditingEntry(e)} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* FAB */}
            <button className="btn-primary" onClick={() => setShowAddEntry(true)} style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', gap: 7, padding: '14px 24px', fontSize: 15, zIndex: 40, whiteSpace: 'nowrap' }}>
              <Plus size={17}/> {t.addEntry}
            </button>
          </div>
        )}
      </main>

      {/* ── Modals ── */}
      {showSettings && <SettingsModal t={t} lang={lang} setLang={setLang} cur={cur} setCur={setCur} onBackup={handleBackup} onRestore={handleRestore} deferredPrompt={deferredPrompt} onInstall={handleInstallClick} onClose={() => setShowSettings(false)} />}
      {showAddSitter && <SitterModal t={t} cur={cur} onSave={handleAddSitter} onClose={() => setShowAddSitter(false)} />}
      {editingSitter && <SitterModal t={t} cur={cur} initial={editingSitter} onSave={handleEditSitter} onClose={() => setEditingSitter(null)} />}
      {(showAddEntry || editingEntry) && activeSitter && (
        <EntryForm t={t} cur={cur} sitter={activeSitter} initial={editingEntry || null} onSave={handleSaveEntry} onClose={() => { setShowAddEntry(false); setEditingEntry(null); }} />
      )}
      
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  
  <!-- Register the Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker registered successfully with scope: ', registration.scope);
          })
          .catch(error => {
            console.log('ServiceWorker registration failed: ', error);
          });
      });
    }
  </script>
</body>
</html>
